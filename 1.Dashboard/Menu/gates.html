<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gates - Notion Leveling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Vertical Slice Logic --- */
        .gates-container {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .gate-card {
            position: relative;
            flex: 1;
            height: 100%;
            transition: flex 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            border-right: 1px solid rgba(0, 0, 0, 0.5);
        }

        .gate-card:last-child {
            border-right: none;
        }

        .gate-card:hover {
            flex: 3;
            filter: brightness(1.1);
            z-index: 10;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .gates-container:hover .gate-card:not(:hover) {
            filter: brightness(0.5) blur(1px);
        }

        /* --- Backgrounds (Mesh Gradients) --- */
        /* S-RANK: Red/Darkness (Hell) */
        .bg-s-rank {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.8)),
                radial-gradient(circle at 50% 30%, #b91c1c, #450a0a, #000000);
        }

        /* A-RANK: Purple/Void (Shadows) */
        .bg-a-rank {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.8)),
                radial-gradient(circle at 50% 40%, #7c3aed, #4c1d95, #1e1b4b);
        }

        /* B-RANK: Blue/Frost (Ice) */
        .bg-b-rank {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.8)),
                radial-gradient(circle at 50% 50%, #2563eb, #1e3a8a, #0f172a);
        }

        /* C-RANK: Green/Poison (Jungle) */
        .bg-c-rank {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.8)),
                radial-gradient(circle at 50% 60%, #16a34a, #14532d, #022c22);
        }

        /* D-RANK: Orange/Desert (Barren) */
        .bg-d-rank {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.8)),
                radial-gradient(circle at 50% 70%, #d97706, #78350f, #271a06);
        }

        /* E-RANK: Slate/Gray (Rookie) */
        .bg-e-rank {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.8)),
                radial-gradient(circle at 50% 80%, #94a3b8, #475569, #0f172a);
        }


        /* --- Topography Overlay --- */
        .texture-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23ffffff' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
        }


        /* --- Typography --- */
        .rank-title {
            font-family: 'Cinzel', serif;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 2;
            transition: all 0.5s ease;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* The glow effect on hover */
        .gate-card:hover .rank-title {
            color: white;
            -webkit-text-stroke: 0px transparent;
            text-shadow: 0 0 20px currentColor;
            /* Uses color from inline style on span usually, or inherited */
            transform: scale(1.1);
        }

        .gate-info {
            position: absolute;
            bottom: 2rem;
            left: 0;
            width: 100%;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease 0.1s;
            z-index: 5;
        }

        .gate-card:hover .gate-info {
            opacity: 1;
            transform: translateY(0);
        }

        .enter-btn {
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 0.5rem 1.5rem;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .enter-btn:hover {
            background-color: white;
            color: black;
            box-shadow: 0 0 15px white;
        }

        /* Particles (Simple CSS animation) */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: rise 5s infinite linear;
            opacity: 0;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 50;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #94a3b8;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background-color: white;
            color: black;
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>

    <a href="Menu.html" class="back-btn" title="Back to Dashboard">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="gates-container">

        <!-- E-RANK -->
        <div class="gate-card bg-e-rank group">
            <div class="texture-overlay"></div>
            <h2 class="rank-title group-hover:text-slate-400" style="text-shadow: 0 0 30px #94a3b8;">E-RANK</h2>
            <div class="gate-info">
                <p class="text-slate-200 mb-2 font-bold tracking-widest text-lg">ROOKIE DIFFICULTY</p>
                <button class="enter-btn hover:text-slate-600 hover:bg-white">ENTER GATE</button>
            </div>
        </div>

        <!-- D-RANK -->
        <div class="gate-card bg-d-rank group">
            <div class="texture-overlay"></div>
            <h2 class="rank-title group-hover:text-amber-500" style="text-shadow: 0 0 30px #f59e0b;">D-RANK</h2>
            <div class="gate-info">
                <p class="text-amber-200 mb-2 font-bold tracking-widest text-lg">BASIC DIFFICULTY</p>
                <button class="enter-btn hover:text-amber-600 hover:bg-white">ENTER GATE</button>
            </div>
        </div>

        <!-- C-RANK -->
        <div class="gate-card bg-c-rank group">
            <div class="texture-overlay"></div>
            <h2 class="rank-title group-hover:text-green-500" style="text-shadow: 0 0 30px #22c55e;">C-RANK</h2>
            <div class="gate-info">
                <p class="text-green-200 mb-2 font-bold tracking-widest text-lg">NORMAL DIFFICULTY</p>
                <button class="enter-btn hover:text-green-600 hover:bg-white">ENTER GATE</button>
            </div>
        </div>

        <!-- B-RANK -->
        <div class="gate-card bg-b-rank group">
            <div class="texture-overlay"></div>
            <h2 class="rank-title group-hover:text-blue-500" style="text-shadow: 0 0 30px #3b82f6;">B-RANK</h2>
            <div class="gate-info">
                <p class="text-blue-200 mb-2 font-bold tracking-widest text-lg">MODERATE DIFFICULTY</p>
                <button class="enter-btn hover:text-blue-600 hover:bg-white">ENTER GATE</button>
            </div>
        </div>

        <!-- A-RANK -->
        <div class="gate-card bg-a-rank group">
            <div class="texture-overlay"></div>
            <h2 class="rank-title group-hover:text-purple-500" style="text-shadow: 0 0 30px #a855f7;">A-RANK</h2>
            <div class="gate-info">
                <p class="text-purple-200 mb-2 font-bold tracking-widest text-lg">HIGH DIFFICULTY</p>
                <button class="enter-btn hover:text-purple-600 hover:bg-white">ENTER GATE</button>
            </div>
        </div>

        <!-- S-RANK -->
        <div class="gate-card bg-s-rank group">
            <div class="texture-overlay"></div>
            <div class="particles">
                <!-- Generating some random particles via JS would be better, but CSS fixed for now -->
            </div>
            <h2 class="rank-title group-hover:text-red-500" style="text-shadow: 0 0 30px #ef4444;">S-RANK</h2>
            <div class="gate-info">
                <p class="text-red-200 mb-2 font-bold tracking-widest text-lg">HELL DIFFICULTY</p>
                <button class="enter-btn hover:text-red-600 hover:bg-white">ENTER GATE</button>
            </div>
        </div>

    </div>

    <script>
        // Simple script to add random delay to particles if we wanted to generate them
        // For now purely CSS/HTML structure

        // Add click handlers to gates to redirect to the game
        document.querySelectorAll('.enter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const rank = e.target.closest('.gate-card').querySelector('h2').innerText;
                localStorage.setItem('selectedDungeonRank', rank);
                window.location.href = '../../99.Game/index.html';
            });
        });
    </script>
</body>

</html>
