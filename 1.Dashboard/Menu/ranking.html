<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Power Rankings - Notion Leveling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .font-header {
            font-family: 'Rajdhani', sans-serif;
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* Avatar styling to mask sprites */
        .avatar-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            background-color: #1e293b;
            border: 2px solid #38bdf8;
        }

        .avatar-container.large {
            width: 100px;
            height: 100px;
            border: 3px solid #fbbf24;
            /* Gold border */
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }

        /* The sprite element inside the container */
        .sprite-avatar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Initial size, will be overridden by JS */
        }

        /* Podium Cards */
        .podium-card {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.1) 0%, rgba(15, 23, 42, 0.4) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            transition: transform 0.3s ease;
        }

        .podium-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.5);
        }

        .podium-1 {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.2) 0%, rgba(15, 23, 42, 0.6) 100%);
            border-top: 4px solid #fbbf24;
            /* Gold */
            height: 380px;
            margin-top: 0;
            z-index: 10;
        }

        .podium-2 {
            border-top: 4px solid #94a3b8;
            /* Silver */
            height: 340px;
            margin-top: 40px;
        }

        .podium-3 {
            border-top: 4px solid #b45309;
            /* Bronze */
            height: 320px;
            margin-top: 60px;
        }

        /* Table Styling */
        .rank-row {
            transition: background-color 0.2s;
        }

        .rank-row:hover {
            background-color: rgba(30, 41, 59, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center py-10">

    <!-- Header -->
    <header class="text-center mb-10 relative w-full max-w-4xl px-4">
        <h1 class="text-4xl md:text-5xl font-bold text-blue-400 font-header neon-text tracking-wider uppercase mb-2">
            Hunter Power Rankings</h1>
        <p class="text-slate-400 text-sm md:text-base">Global Leaderboard & Daily Streaks</p>

        <div class="absolute top-0 left-4">
            <a href="Menu.html" class="flex items-center text-slate-500 hover:text-white transition group">
                <i class="fas fa-chevron-left mr-2 group-hover:-translate-x-1 transition-transform"></i> Back
            </a>
        </div>
    </header>

    <!-- My Rank Banner -->
    <div class="w-full max-w-4xl px-4 mb-16">
        <div
            class="bg-slate-900 border border-slate-700 rounded-lg p-6 flex flex-col md:flex-row items-center justify-between shadow-lg relative overflow-hidden">
            <div class="absolute inset-0 bg-blue-500/5 z-0"></div>
            <div class="relative z-10 text-center md:text-left mb-4 md:mb-0">
                <h3 class="text-lg text-blue-400 font-bold mb-1">Your Current Rank</h3>
                <div id="user-rank-val" class="text-5xl font-bold text-white font-header">#283</div>
                <div id="user-rank-desc" class="text-xs text-slate-400 mt-1">Power Score: 850</div>
            </div>

            <!-- Tabs -->
            <div class="relative z-10 flex bg-slate-800 rounded-lg p-1">
                <button id="btn-power"
                    class="px-6 py-2 rounded-md bg-blue-600 text-white font-semibold text-sm shadow-md transition active-tab">Overall
                    Power</button>
                <button id="btn-streak"
                    class="px-6 py-2 rounded-md hover:bg-slate-700 text-slate-400 font-semibold text-sm transition transition-colors">Daily
                    Streak</button>
            </div>
        </div>
    </div>

    <!-- Top 3 Podium (Visual) -->
    <div class="w-full max-w-4xl px-4 flex justify-center items-end gap-4 md:gap-8 mb-16">

        <!-- Rank 2 -->
        <div class="w-1/3 max-w-[200px] podium-card podium-2 rounded-t-lg flex flex-col items-center pt-8 relative">
            <div class="absolute -top-10">
                <div class="avatar-container">
                    <div id="p2-sprite" class="sprite-avatar" data-sprite-asset="menu" data-sprite-frame="2.png"></div>
                </div>
            </div>
            <div class="mt-8 text-center px-2">
                <div id="p2-name" class="text-2xl font-bold text-white font-header">Lee Joohee</div>
                <div id="p2-class" class="text-sm text-blue-400 font-semibold mt-1">Healer Class</div>
                <div class="mt-4 bg-slate-800/50 rounded-full px-4 py-1 text-sm border border-slate-700">
                    <span id="p2-value" class="text-yellow-400 font-bold">5,012 pts</span>
                </div>
                <div class="mt-4 flex gap-1 justify-center text-yellow-400 text-xs">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i
                        class="fas fa-star"></i>
                </div>
            </div>
            <div class="mt-auto mb-6 text-6xl font-bold text-slate-700 font-header opacity-30">2</div>
        </div>

        <!-- Rank 1 -->
        <div
            class="w-1/3 max-w-[220px] podium-card podium-1 rounded-t-lg flex flex-col items-center pt-8 relative shadow-[0_0_40px_rgba(59,130,246,0.2)]">
            <div class="absolute -top-16 flex flex-col items-center">
                <i
                    class="fas fa-crown text-3xl text-yellow-400 mb-2 drop-shadow-[0_0_10px_rgba(251,191,36,0.8)] animate-bounce"></i>
                <div class="avatar-container large">
                    <div id="p1-sprite" class="sprite-avatar" data-sprite-asset="menu" data-sprite-frame="1.PNG"></div>
                </div>
            </div>
            <div class="mt-12 text-center px-2">
                <div id="p1-name" class="text-3xl font-bold text-white font-header neon-text">Shadow Monarch</div>
                <div id="p1-class" class="text-sm text-blue-400 font-semibold mt-1">Necromancer Class</div>
                <div class="mt-6 bg-blue-600 rounded-full px-6 py-2 text-base font-bold shadow-lg">
                    <span id="p1-value" class="text-white">6,664 pts</span>
                </div>
                <div class="mt-4 flex gap-1 justify-center text-yellow-400 text-sm">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i
                        class="fas fa-star"></i><i class="fas fa-star"></i>
                </div>
            </div>
            <div class="mt-auto mb-6 text-8xl font-bold text-blue-500 font-header opacity-20">1</div>
        </div>

        <!-- Rank 3 -->
        <div class="w-1/3 max-w-[200px] podium-card podium-3 rounded-t-lg flex flex-col items-center pt-8 relative">
            <div class="absolute -top-10">
                <div class="avatar-container">
                    <div id="p3-sprite" class="sprite-avatar" data-sprite-asset="menu" data-sprite-frame="3.png"></div>
                </div>
            </div>
            <div class="mt-8 text-center px-2">
                <div id="p3-name" class="text-2xl font-bold text-white font-header">Cha Hae-In</div>
                <div id="p3-class" class="text-sm text-blue-400 font-semibold mt-1">Fighter Class</div>
                <div class="mt-4 bg-slate-800/50 rounded-full px-4 py-1 text-sm border border-slate-700">
                    <span id="p3-value" class="text-yellow-400 font-bold">3,640 pts</span>
                </div>
                <div class="mt-4 flex gap-1 justify-center text-yellow-400 text-xs">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                </div>
            </div>
            <div class="mt-auto mb-6 text-6xl font-bold text-slate-700 font-header opacity-30">3</div>
        </div>

    </div>

    <!-- Leaderboard List (Rank 4+) -->
    <div class="w-full max-w-4xl px-4 pb-20">
        <div class="bg-slate-900/50 rounded-lg border border-slate-800 overflow-hidden">
            <!-- Table Header -->
            <div
                class="grid grid-cols-12 gap-4 p-4 bg-slate-900 border-b border-slate-700 text-slate-400 font-semibold text-sm uppercase tracking-wider">
                <div class="col-span-1 text-center">#</div>
                <div class="col-span-1 text-center">Rank</div>
                <div class="col-span-6 md:col-span-5">Hunter</div>
                <div class="col-span-2 text-center hidden md:block">Level</div>
                <div class="col-span-4 md:col-span-3 text-right">Score</div>
            </div>

            <!-- Dynamic List Container -->
            <div id="leaderboard-list">
                <!-- Javascript will populate this -->
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // --- MOCK DATA GENERATOR ---
            const hunterNames = ["Jin-Chul", "Dong-Su", "Kyung-Hye", "Jong-In", "Tae-Gyu", "Min-Chul", "Seung-Han", "Eun-Ha", "Ji-Won", "Hyun-Woo", "Sae-Rom", "Da-Eun", "Myung-Hoon", "So-Young", "Jae-Wook", "Hae-Min", "Yoon-Seo", "Gun-Woo", "Hee-Jin", "Sang-Min"];

            function getRankFromLevel(level) {
                if (level >= 100) return 'S';
                if (level >= 80) return 'A';
                if (level >= 60) return 'B';
                if (level >= 40) return 'C';
                if (level >= 20) return 'D';
                return 'E';
            }

            function generateMockData(startRank, count, type) {
                const generated = [];
                let currentScore = type === 'power' ? 1500 : 10;

                for (let i = 0; i < count; i++) {
                    const rank = startRank + i;
                    const name = hunterNames[Math.floor(Math.random() * hunterNames.length)] + " " + String.fromCharCode(65 + Math.floor(Math.random() * 26));

                    // Generate level based on rank (higher rank = higher level generally, but with variance)
                    // We want decreasing levels broadly speaking
                    const baseLevel = Math.max(10, 80 - (i * 1.5));
                    const level = Math.floor(baseLevel + Math.random() * 10);

                    const rankClass = getRankFromLevel(level);

                    // Decreasing value logic
                    let value;
                    if (type === 'power') {
                        currentScore = Math.max(100, currentScore - Math.floor(Math.random() * 40));
                        value = currentScore.toString(); // Remove commas
                    } else {
                        currentScore = Math.max(1, currentScore - (Math.random() > 0.7 ? 1 : 0)); // Only decrease sometimes
                        value = `${currentScore} Days 🔥`;
                    }

                    generated.push({ rank, rankClass, name, level, value });
                }
                return generated;
            }

            // --- DATA ---
            const rankingData = {
                power: {
                    user: { rank: "#12", desc: `Power Score: ${localStorage.getItem('playerExp') || '850'}` },
                    top3: [
                        { name: "Shadow Monarch", class: "Necromancer Class", value: "6664 pts", frame: "1.PNG" }, // Rank 1
                        { name: "Lee Joohee", class: "Healer Class", value: "5012 pts", frame: "2.png" }, // Rank 2
                        { name: "Cha Hae-In", class: "Fighter Class", value: "3640 pts", frame: "3.png" }  // Rank 3
                    ],
                    list: [
                        { rank: 4, rankClass: "S", name: "Frost", level: 104, value: "2912" }, // Lvl 104 -> S
                        { rank: 5, rankClass: "A", name: "OMICRON", level: 82, value: "2072" }, // Adjusted to match A
                        { rank: 6, rankClass: "B", name: "Kiko", level: 62, value: "1736" }, // Lvl 62 -> B
                        { rank: 7, rankClass: "C", name: "KJ", level: 57, value: "1596" }, // Lvl 57 -> C
                        { rank: 8, rankClass: "C", name: "Dereck", level: 55, value: "1540" }, // Lvl 55 -> C
                        ...generateMockData(9, 42, 'power') // Generate up to 50
                    ]
                },
                streak: {
                    user: { rank: "#15", desc: `Current Streak: ${localStorage.getItem('playerStreak') || 0} Days 🔥` },
                    top3: [
                        { name: "Shadow Monarch", class: "Necromancer Class", value: "89 Days 🔥", frame: "1.PNG" }, // Rank 1
                        { name: "Cha Hae-In", class: "Fighter Class", value: "76 Days 🔥", frame: "3.png" },  // Rank 2
                        { name: "Lee Joohee", class: "Healer Class", value: "65 Days 🔥", frame: "2.png" }, // Rank 3
                    ],
                    list: [
                        { rank: 4, rankClass: "S", name: "Siyoon", level: 109, value: "60 Days 🔥" },
                        { rank: 5, rankClass: "A", name: "Woo Jinchul", level: 95, value: "55 Days 🔥" },
                        { rank: 6, rankClass: "B", name: "Kiko", level: 62, value: "48 Days 🔥" },
                        { rank: 7, rankClass: "C", name: "Frost", level: 104, value: "30 Days 🔥" },
                        { rank: 8, rankClass: "D", name: "OMICRON", level: 74, value: "12 Days 🔥" },
                        ...generateMockData(9, 42, 'streak') // Generate up to 50
                    ]
                }
            };

            // Sprite Configuration
            const spriteConfigurations = {
                "menu": {
                    "1.PNG": { scale: 1.6, top: '15%' },
                    "2.png": { scale: 1.7, top: '0%' }, // Adjusted
                    "3.png": { scale: 1.7, top: '25%' },
                    "4.png": { scale: 1.8, top: '0%' },
                    "5.png": { scale: 1.8, top: '-20%' }, // Adjusted
                    "6.png": { scale: 1.8, top: '-30%' }, // Adjusted
                }
            };


            // --- ELEMENTS ---
            const btnPower = document.getElementById('btn-power');
            const btnStreak = document.getElementById('btn-streak');
            const listContainer = document.getElementById('leaderboard-list');

            // --- FUNCTIONS ---

            function render(mode) {
                const data = JSON.parse(JSON.stringify(rankingData[mode]));
                
                const playerName = localStorage.getItem('playerName') || 'CS Student';
                const playerLevel = parseInt(localStorage.getItem('playerLevel')) || 1;
                const playerRankClass = getRankFromLevel(playerLevel);
                
                let playerValueInt = 0;
                let playerValueStr = "";
                if (mode === 'power') {
                    playerValueInt = parseInt(localStorage.getItem('playerExp')) || 0;
                    playerValueStr = playerValueInt + ' pts';
                } else {
                    playerValueInt = parseInt(localStorage.getItem('playerStreak')) || 0;
                    playerValueStr = playerValueInt + ' Days 🔥';
                }

                // Create user item
                const userItem = {
                    name: playerName + ' (You)',
                    class: "Player Class",
                    level: playerLevel,
                    rankClass: playerRankClass,
                    value: playerValueStr,
                    rawVal: playerValueInt,
                    frame: "3.png", // default avatar
                    isUser: true
                };

                let allItems = [];
                data.top3.forEach(item => {
                    let val = parseInt(item.value.replace(/[^0-9]/g, '')) || 0;
                    allItems.push({ ...item, rawVal: val });
                });
                data.list.forEach(item => {
                    let val = parseInt(item.value.replace(/[^0-9]/g, '')) || 0;
                    let displayVal = item.value;
                    if (mode === 'power' && !displayVal.includes('pts')) {
                        displayVal += ' pts';
                    }
                    allItems.push({ ...item, value: displayVal, rawVal: val });
                });

                // Remove the old hardcoded user placeholder
                const oldUserRank = mode === 'power' ? 12 : 15;
                allItems = allItems.filter(item => item.rank !== oldUserRank);

                // Add the true user
                allItems.push(userItem);

                // Sort descending
                allItems.sort((a, b) => b.rawVal - a.rawVal);

                // Reassign ranks
                allItems.forEach((item, index) => {
                    item.rank = index + 1;
                });

                // Set user banner rank
                const userFinalRank = allItems.findIndex(i => i.isUser) + 1;
                document.getElementById('user-rank-val').textContent = "#" + userFinalRank;
                document.getElementById('user-rank-desc').textContent = mode === 'power' ? `Power Score: ${playerValueInt}` : `Current Streak: ${playerValueInt} Days 🔥`;

                // Re-split into top3 and list
                const finalTop3 = allItems.slice(0, 3);
                const finalList = allItems.slice(3);

                // 2. Update Podium (Top 3)
                updatePodium(1, finalTop3[0]);
                updatePodium(2, finalTop3[1]);
                updatePodium(3, finalTop3[2]);

                // 3. Update List (Rank 4+)
                listContainer.innerHTML = '';
                
                finalList.forEach(item => {
                    const row = document.createElement('div');
                    let rowClass = 'grid grid-cols-12 gap-4 p-4 items-center border-b border-slate-800 rank-row';
                    if (item.isUser) {
                        rowClass += ' bg-blue-900/40 border-blue-500 shadow-[inset_0_0_10px_rgba(59,130,246,0.5)]';
                    }
                    row.className = rowClass;

                    row.innerHTML = `
                         <div class="col-span-1 text-center font-bold ${item.isUser ? 'text-blue-400' : 'text-slate-500'}">${item.rank}</div>
                        <div class="col-span-1 text-center text-${getRankColor(item.rankClass)} font-bold">${item.rankClass || 'C'}</div>
                        <div class="col-span-6 md:col-span-5 flex items-center gap-3 px-4">
                            <span class="font-bold ${item.isUser ? 'text-blue-300' : 'text-slate-200'}">${item.name}</span>
                        </div>
                        <div class="col-span-2 text-center ${item.isUser ? 'text-blue-200 font-bold' : 'text-slate-400'} hidden md:block">${item.level || 1}</div>
                        <div class="col-span-4 md:col-span-3 text-right font-bold text-yellow-400">${item.value}</div>
                    `;
                    listContainer.appendChild(row);
                });
            }

            function updatePodium(rankNum, podData) {
                document.getElementById(`p${rankNum}-name`).textContent = podData.name;
                document.getElementById(`p${rankNum}-class`).textContent = podData.class;
                document.getElementById(`p${rankNum}-value`).textContent = podData.value;

                // Update Sprite
                const spriteEl = document.getElementById(`p${rankNum}-sprite`);
                spriteEl.dataset.spriteFrame = podData.frame;
                // Force reload of sprite
                loadSprite(spriteEl);
            }

            function getRankColor(rankClass) {
                if (rankClass === 'S') return 'red-500';
                if (rankClass === 'A') return 'orange-500';
                if (rankClass === 'B') return 'purple-500';
                if (rankClass === 'C') return 'blue-400';
                return 'green-500'; // D & E
            }

            // Sprite Loader Logic
            function loadSprite(spriteElement) {
                const asset = spriteElement.dataset.spriteAsset;
                const frameName = spriteElement.dataset.spriteFrame;
                if (!asset || !frameName) return;

                const jsonUrl = `../../99.Game/assets/${asset}.json`;
                const imageUrl = `../../99.Game/assets/${asset}.png`;

                fetch(jsonUrl)
                    .then(response => response.json())
                    .then(data => {
                        let frameData;
                        for (const key in data.frames) {
                            if (key.toLowerCase() === frameName.toLowerCase()) {
                                frameData = data.frames[key];
                                break;
                            }
                        }
                        if (frameData) {
                            const { frame } = frameData;
                            spriteElement.style.backgroundImage = `url('${imageUrl}')`;
                            spriteElement.style.backgroundRepeat = 'no-repeat';
                            spriteElement.style.width = `${frame.w}px`;
                            spriteElement.style.height = `${frame.h}px`;
                            spriteElement.style.backgroundPosition = `-${frame.x}px -${frame.y}px`;

                            const container = spriteElement.parentElement;
                            const containerRect = container.getBoundingClientRect();
                            const targetWidth = containerRect.width;

                            const config = (spriteConfigurations[asset] && spriteConfigurations[asset][frameName]) || {};
                            const zoom = config.scale || 1.5;
                            const topOffset = config.top || '15%';

                            const scale = (targetWidth / frame.w) * zoom;

                            spriteElement.style.transformOrigin = 'top center';
                            spriteElement.style.position = 'absolute';
                            spriteElement.style.left = '50%';
                            spriteElement.style.top = topOffset;
                            spriteElement.style.transform = `translate(-50%, 0) scale(${scale})`;
                        }
                    })
                    .catch(e => console.error(e));
            }

            // --- EVENT LISTENERS ---
            btnPower.addEventListener('click', () => {
                btnPower.classList.add('bg-blue-600', 'text-white', 'shadow-md');
                btnPower.classList.remove('text-slate-400', 'hover:bg-slate-700');

                btnStreak.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                btnStreak.classList.add('text-slate-400', 'hover:bg-slate-700');

                render('power');
            });

            btnStreak.addEventListener('click', () => {
                btnStreak.classList.add('bg-blue-600', 'text-white', 'shadow-md');
                btnStreak.classList.remove('text-slate-400', 'hover:bg-slate-700');

                btnPower.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                btnPower.classList.add('text-slate-400', 'hover:bg-slate-700');

                render('streak');
            });

            // Initial Render
            render('power');
        });
    </script>
</body>

</html>
