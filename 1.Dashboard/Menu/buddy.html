<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Army - Notion Leveling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .font-header {
            font-family: 'Rajdhani', sans-serif;
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .shadow-glow {
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.3);
        }

        /* Status Bar Animation */
        .stat-fill {
            transition: width 0.5s ease-in-out, background-color 0.3s;
        }

        /* Pet Container */
        .pet-stage {
            background: radial-gradient(circle, rgba(147, 51, 234, 0.2) 0%, rgba(15, 23, 42, 0) 70%);
            position: relative;
        }

        /* Shadow Effect */
        .shadow-sprite {
            filter: drop-shadow(0 0 8px #a855f7);
            /* Purple shadow glow */
            transition: all 0.5s ease;
        }

        .shadow-sprite.happy {
            filter: brightness(1.2) drop-shadow(0 0 15px #fbbf24);
            /* Gold glow when happy */
            transform: scale(1.1);
        }

        /* Floating Particles */
        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-50px) scale(1.5);
                opacity: 0;
            }
        }

        .particle {
            position: absolute;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center py-6">

    <!-- Header -->
    <header class="text-center mb-6 relative w-full max-w-lg px-4">
        <h1 class="text-3xl font-bold text-purple-400 font-header neon-text tracking-wider uppercase mb-1">
            Shadow Extraction</h1>
        <p class="text-slate-500 text-xs uppercase tracking-widest">Raise your Army</p>
        <div class="absolute top-1 left-4">
            <a href="Menu.html" class="flex items-center text-slate-500 hover:text-white transition group">
                <i class="fas fa-chevron-left mr-2 group-hover:-translate-x-1 transition-transform"></i> Back
            </a>
        </div>
    </header>

    <!-- Main Game Container -->
    <div class="w-full max-w-md bg-slate-900 border border-slate-700 rounded-2xl overflow-hidden shadow-2xl relative">

        <!-- Info Bar -->
        <div
            class="flex justify-between items-center p-4 bg-slate-900/80 border-b border-slate-800 absolute top-0 w-full z-20">
            <div class="flex items-center gap-2">
                <div
                    class="w-8 h-8 rounded-full bg-purple-900/50 flex items-center justify-center border border-purple-500/30">
                    <i class="fas fa-ghost text-purple-400 text-sm"></i>
                </div>
                <div>
                    <div class="text-sm font-bold text-white leading-none">Mini Fenrir</div>
                    <div class="text-xs text-purple-400">Lvl <span id="pet-level">1</span> • <span id="pet-stage">Shadow
                            Pup</span></div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs text-slate-400">Next Evo</div>
                <div class="w-20 h-1.5 bg-slate-800 rounded-full mt-1 overflow-hidden">
                    <div id="xp-bar" class="h-full bg-yellow-400 w-[10%]"></div>
                </div>
            </div>
        </div>

        <!-- Pet Stage (Visual) -->
        <div class="h-80 w-full pet-stage flex items-center justify-center relative overflow-hidden group cursor-pointer"
            id="pet-container">
            <!-- Background Decoration -->
            <div class="absolute inset-0 opacity-20 pointer-events-none"
                style="background-image: radial-gradient(#6b21a8 1px, transparent 1px); background-size: 20px 20px;">
            </div>

            <!-- The Pet Sprite (Shadow Wolf) -->
            <div id="buddy-sprite" class="shadow-sprite w-40 h-40 bg-no-repeat bg-contain"></div>

            <!-- Speech Bubble -->
            <div id="speech-bubble"
                class="absolute top-16 right-10 bg-white text-slate-900 text-xs font-bold px-3 py-1 rounded-lg shadow-lg opacity-0 transition-opacity duration-300">
                ...
            </div>
        </div>

        <!-- Stats Panel -->
        <div
            class="p-6 bg-slate-800 relative z-10 rounded-t-3xl -mt-6 border-t border-slate-700 shadow-[0_-5px_20px_rgba(0,0,0,0.5)]">

            <!-- Needs Grid -->
            <div class="grid grid-cols-2 gap-x-6 gap-y-4 mb-6">
                <!-- Hunger -->
                <div>
                    <div class="flex justify-between mb-1">
                        <span class="text-xs font-bold text-slate-400"><i class="fas fa-drumstick-bite mr-1"></i>
                            Hunger</span>
                        <span id="val-hunger" class="text-xs font-bold text-white">80%</span>
                    </div>
                    <div class="w-full h-2 bg-slate-900 rounded-full overflow-hidden">
                        <div id="bar-hunger" class="h-full bg-green-500 stat-fill w-[80%]"></div>
                    </div>
                </div>
                <!-- Happiness -->
                <div>
                    <div class="flex justify-between mb-1">
                        <span class="text-xs font-bold text-slate-400"><i class="fas fa-heart mr-1"></i> Mood</span>
                        <span id="val-happiness" class="text-xs font-bold text-white">50%</span>
                    </div>
                    <div class="w-full h-2 bg-slate-900 rounded-full overflow-hidden">
                        <div id="bar-happiness" class="h-full bg-pink-500 stat-fill w-[50%]"></div>
                    </div>
                </div>
                <!-- Hygiene -->
                <div>
                    <div class="flex justify-between mb-1">
                        <span class="text-xs font-bold text-slate-400"><i class="fas fa-soap mr-1"></i> Hygiene</span>
                        <span id="val-hygiene" class="text-xs font-bold text-white">90%</span>
                    </div>
                    <div class="w-full h-2 bg-slate-900 rounded-full overflow-hidden">
                        <div id="bar-hygiene" class="h-full bg-blue-400 stat-fill w-[90%]"></div>
                    </div>
                </div>
                <!-- Energy -->
                <div>
                    <div class="flex justify-between mb-1">
                        <span class="text-xs font-bold text-slate-400"><i class="fas fa-bolt mr-1"></i> Energy</span>
                        <span id="val-energy" class="text-xs font-bold text-white">40%</span>
                    </div>
                    <div class="w-full h-2 bg-slate-900 rounded-full overflow-hidden">
                        <div id="bar-energy" class="h-full bg-yellow-400 stat-fill w-[40%]"></div>
                    </div>
                </div>
            </div>

            <!-- Actions Controls -->
            <div class="grid grid-cols-4 gap-3">
                <button id="btn-feed"
                    class="flex flex-col items-center justify-center p-3 rounded-xl bg-slate-700 hover:bg-slate-600 active:scale-95 transition border border-slate-600 group">
                    <div
                        class="w-10 h-10 rounded-full bg-green-900/30 flex items-center justify-center mb-1 group-hover:bg-green-500/20 transition">
                        <i class="fas fa-bone text-green-400 text-lg"></i>
                    </div>
                    <span class="text-[10px] font-bold text-slate-300 uppercase">Feed</span>
                </button>
                <button id="btn-clean"
                    class="flex flex-col items-center justify-center p-3 rounded-xl bg-slate-700 hover:bg-slate-600 active:scale-95 transition border border-slate-600 group">
                    <div
                        class="w-10 h-10 rounded-full bg-blue-900/30 flex items-center justify-center mb-1 group-hover:bg-blue-500/20 transition">
                        <i class="fas fa-broom text-blue-400 text-lg"></i>
                    </div>
                    <span class="text-[10px] font-bold text-slate-300 uppercase">Clean</span>
                </button>
                <button id="btn-play"
                    class="flex flex-col items-center justify-center p-3 rounded-xl bg-slate-700 hover:bg-slate-600 active:scale-95 transition border border-slate-600 group">
                    <div
                        class="w-10 h-10 rounded-full bg-pink-900/30 flex items-center justify-center mb-1 group-hover:bg-pink-500/20 transition">
                        <i class="fas fa-hand-holding-heart text-pink-400 text-lg"></i>
                    </div>
                    <span class="text-[10px] font-bold text-slate-300 uppercase">Pet</span>
                </button>
                <button id="btn-train"
                    class="flex flex-col items-center justify-center p-3 rounded-xl bg-slate-700 hover:bg-slate-600 active:scale-95 transition border border-slate-600 group">
                    <div
                        class="w-10 h-10 rounded-full bg-purple-900/30 flex items-center justify-center mb-1 group-hover:bg-purple-500/20 transition">
                        <i class="fas fa-dumbbell text-purple-400 text-lg"></i>
                    </div>
                    <span class="text-[10px] font-bold text-slate-300 uppercase">Train</span>
                </button>
            </div>

        </div>
    </div>

    <!-- JS Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- STATE ---
            let petState = {
                hunger: 60,
                happiness: 40,
                hygiene: 80,
                energy: 50,
                xp: 15,
                level: 1,
                stage: 'Wisp'
            };

            const spriteEl = document.getElementById('buddy-sprite');

            // --- SPRITE LOADER (Simple Image) ---
            function loadSprite() {
                // Using the generated static asset
                spriteEl.style.backgroundImage = `url('../../99.Game/assets/shadow_wolf.png')`;
                spriteEl.style.backgroundSize = 'contain';
                spriteEl.style.backgroundPosition = 'center';
                spriteEl.style.width = '180px'; // Adjusted size for the wolf
                spriteEl.style.height = '180px';
                spriteEl.style.transform = 'scale(1)';
            }
            loadSprite();

            // --- GAME LOOP ---
            function updateUI() {
                // Update Bars
                setBar('hunger', petState.hunger);
                setBar('happiness', petState.happiness);
                setBar('hygiene', petState.hygiene);
                setBar('energy', petState.energy);

                // Update Labels
                document.getElementById('pet-level').innerText = petState.level;
                document.getElementById('xp-bar').style.width = `${petState.xp}%`;

                // Critical Warning
                if (petState.hunger < 20 || petState.hygiene < 20) {
                    spriteEl.classList.add('animate-pulse'); // Distress
                } else {
                    spriteEl.classList.remove('animate-pulse');
                }
            }

            function setBar(type, val) {
                const bar = document.getElementById(`bar-${type}`);
                const txt = document.getElementById(`val-${type}`);

                bar.style.width = `${val}%`;
                txt.innerText = `${val.toFixed(1)}%`;

                // Color Logic
                bar.classList.remove('bg-red-500', 'bg-yellow-500', 'bg-green-500', 'bg-blue-400', 'bg-pink-500');
                if (val < 30) bar.classList.add('bg-red-500');
                else if (val < 60) bar.classList.add('bg-yellow-500');
                else {
                    if (type === 'hunger') bar.classList.add('bg-green-500');
                    if (type === 'happiness') bar.classList.add('bg-pink-500');
                    if (type === 'hygiene') bar.classList.add('bg-blue-400');
                    if (type === 'energy') bar.classList.add('bg-purple-500');
                }
            }

            // Decay Loop (Simulation)
            setInterval(() => {
                petState.hunger = Math.max(0, petState.hunger - 1);
                petState.hygiene = Math.max(0, petState.hygiene - 0.5);
                petState.energy = Math.max(0, petState.energy - 0.2);
                updateUI();
            }, 3000); // Every 3 sec decay for demo

            // --- ACTIONS ---
            function spawnParticle(icon, color) {
                const p = document.createElement('div');
                p.className = 'particle text-2xl absolute top-1/2 left-1/2 z-50';
                p.style.color = color;
                p.innerHTML = `<i class="fas ${icon}"></i>`;
                // Random drift
                p.style.left = `${50 + (Math.random() * 20 - 10)}%`;
                document.getElementById('pet-container').appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }

            function showSpeech(text) {
                const b = document.getElementById('speech-bubble');
                b.innerText = text;
                b.style.opacity = 1;
                setTimeout(() => b.style.opacity = 0, 2000);
            }

            // Feed
            document.getElementById('btn-feed').onclick = () => {
                if (petState.hunger >= 100) return showSpeech("I'm full!");
                petState.hunger = Math.min(100, petState.hunger + 15);
                spawnParticle('fa-drumstick-bite', '#22c55e');
                showSpeech("Yummy!");
                updateUI();
            };

            // Clean
            document.getElementById('btn-clean').onclick = () => {
                if (petState.hygiene >= 100) return showSpeech("Sparkling clean!");
                petState.hygiene = Math.min(100, petState.hygiene + 30);
                spawnParticle('fa-sparkles', '#60a5fa');
                showSpeech("Fresh!");
                updateUI();
            };

            // Pet (Play)
            document.getElementById('btn-play').onclick = () => {
                petState.happiness = Math.min(100, petState.happiness + 10);
                // Visual Reaction
                spriteEl.classList.add('happy');
                setTimeout(() => spriteEl.classList.remove('happy'), 500);

                spawnParticle('fa-heart', '#ec4899');
                showSpeech("Love you!");
                updateUI();
            };

            // Train (Cost Energy, Gain XP)
            document.getElementById('btn-train').onclick = () => {
                if (petState.energy < 20) return showSpeech("Too tired...");
                petState.energy -= 20;
                petState.hunger -= 10;
                petState.xp += 25;

                if (petState.xp >= 100) {
                    petState.xp = 0;
                    petState.level++;
                    spawnParticle('fa-arrow-up', '#eab308');
                    showSpeech("LEVEL UP!");
                } else {
                    spawnParticle('fa-dumbbell', '#a855f7');
                    showSpeech("Stronger!");
                }
                updateUI();
            };

            updateUI();
        });
    </script>
</body>

</html>
